name: Docker

on:
  workflow_dispatch:
  push:
    # 在main分支有新的提交时触发
    branches: [ main ]


env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

jobs:
  build:
    name: Pull
    runs-on: ubuntu-latest
    steps:
    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    # 增加可用磁盘空间
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:

        root-reserve-mb: 2048
        swap-size-mb: 128
        remove-dotnet: 'true'
        remove-haskell: 'true'
        # 如果空间还是不够用，可以把以下开启，清理出更多空间
        # remove-android: 'true'
        # remove-codeql: 'true'
        build-mount-path: '/var/lib/docker/'

    - name: Restart docker
      run: sudo service docker restart

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v3

    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq

    - name: Build and push image Aliyun
      run: |
        echo "$ALIYUN_REGISTRY_PASSWORD" | docker login -u "$ALIYUN_REGISTRY_USER" --password-stdin "$ALIYUN_REGISTRY"

        # 获取镜像 digest
        get_image_digest() {
            local image="$1"
            docker manifest inspect "$image" 2>/dev/null | jq -r '.config.digest' 2>/dev/null || echo ""
        }

        # 检查镜像是否需要更新（比较 Docker Hub 和阿里云的 digest）
        check_need_update() {
            local source_image="$1"
            local target_image="$2"

            # 获取源镜像（Docker Hub）的 digest
            local source_digest=$(get_image_digest "$source_image")
            if [ -z "$source_digest" ]; then
                echo "[WARN] 无法获取源镜像 digest: $source_image"
                return 0  # 无法获取时默认需要更新
            fi

            # 获取目标镜像（阿里云）的 digest
            local target_digest=$(get_image_digest "$target_image")
            if [ -z "$target_digest" ]; then
                echo "[INFO] 阿里云镜像不存在: $target_image"
                return 0  # 阿里云不存在，需要更新
            fi

            # 比较 digest
            if [ "$source_digest" != "$target_digest" ]; then
                echo "[INFO] digest 不同，需要更新"
                echo "  Docker Hub: $source_digest"
                echo "  阿里云:     $target_digest"
                return 0  # 需要更新
            else
                echo "[INFO] digest 相同，无需更新"
                return 1  # 不需要更新
            fi
        }

        # 数据预处理,判断镜像是否重名
        # 存储重名镜像
        declare -A duplicate_images
        # 临时存储镜像名与命名空间的映射
        declare -A temp_map
        # 第一次遍历 images.txt 文件，找到重名的镜像
        while IFS= read -r line || [ -n "$line" ]; do
            # 忽略空行与注释
            [[ -z "$line" ]] && continue
            if echo "$line" | grep -q '^\s*#'; then
                continue
            fi
            
            # 获取镜像的完整名称，例如kasmweb/nginx:1.25.3（命名空间/镜像名:版本号）
            image=$(echo "$line" | awk '{print $NF}')
            # 将@sha256:等字符删除
            image="${image%%@*}"
            echo "image $image"
            # 获取镜像名:版本号  例如nginx:1.25.3
            image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
            echo "image_name_tag $image_name_tag"
            # 获取命名空间 例如kasmweb,  这里有种特殊情况 docker.io/nginx，把docker.io当成命名空间，也OK
            name_space=$(echo "$image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
            echo "name_space: $name_space"
            # 这里不要是空值影响判断
            name_space="${name_space}_"
            # 获取镜像名例如nginx
            image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')
            echo "image_name: $image_name"
            
            # 如果镜像存在于数组中，则添加temp_map
            if [[ -n "${temp_map[$image_name]}" ]]; then
                 # 如果temp_map已经存在镜像名，判断是不是同一命名空间
                 if [[ "${temp_map[$image_name]}" != $name_space  ]]; then
                    echo "duplicate image name: $image_name"
                    duplicate_images[$image_name]="true"
                 fi
            else
                # 存镜像的命名空间
                temp_map[$image_name]=$name_space
            fi       
        done < images.txt
        
        # 第二次遍历 images.txt 文件，拉取、标记、推送镜像
        while IFS= read -r line || [ -n "$line" ]; do
            # 忽略空行与注释
            [[ -z "$line" ]] && continue
            if echo "$line" | grep -q '^\s*#'; then
                continue
            fi

            # 获取镜像的完整名称，例如kasmweb/nginx:1.25.3（命名空间/镜像名:版本号）
            image=$(echo "$line" | awk '{print $NF}')
            # 获取 镜像名:版本号  例如nginx:1.25.3
            image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
            # 获取命名空间 例如kasmweb
            name_space=$(echo "$image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
            # 获取镜像名例  例如nginx
            image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')

            name_space_prefix=""
            # 只要有命名空间就加前缀
            if [[ -n "${name_space}" ]]; then
               name_space_prefix="${name_space}_"
            fi

            # 解析架构信息（如 --platform linux/amd64）
            platform=$(echo "$line" | awk -F'--platform[ =]' '{if (NF>1) print $2}' | awk '{print $1}')
            # 如果存在架构信息，将架构信息拼到 tag 后面作为后缀
            if [ -z "$platform" ]; then
                platform_suffix=""
            else
                # 转换为 -linux-amd64 或 -linux-arm64 格式
                platform_suffix="-${platform//\//-}"
            fi

            # 将@sha256:等字符删除
            image_name_tag="${image_name_tag%%@*}"
            # 分离镜像名和 tag
            image_tag_only=$(echo "$image_name_tag" | awk -F':' '{print $2}')
            if [ -z "$image_tag_only" ]; then
                # 没有指定 tag，默认 latest
                new_tag="latest${platform_suffix}"
            else
                new_tag="${image_tag_only}${platform_suffix}"
            fi
            new_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/${name_space_prefix}${image_name}:${new_tag}"

            # 检查是否需要更新（比较 Docker Hub 和阿里云的 digest）
            if ! check_need_update "$image" "$new_image"; then
                echo "[SKIP] 镜像已是最新: $new_image"
                continue
            fi

            echo "[PULL] $line"
            if ! docker pull $line; then
                echo "[ERROR] 拉取失败: $line，跳过"
                continue
            fi

            echo "[TAG] $image -> $new_image"
            docker tag $image $new_image

            echo "[PUSH] $new_image"
            if ! docker push $new_image; then
                echo "[ERROR] 推送失败: $new_image"
                continue
            fi

            echo "[CLEAN] 清理镜像..."
            docker rmi $image $new_image > /dev/null 2>&1 || true
            echo "[DONE] ${name_space_prefix}${image_name}:${new_tag}"
            echo "----------------------------------------"

        done < images.txt
        echo "所有镜像处理完成"